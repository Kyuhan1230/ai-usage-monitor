name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-publication
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    environment: production-release
    env:
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-23

      - name: Install frontend build tooling
        run: npm ci

      - name: Verify tag matches package version
        shell: pwsh
        run: npm run verify:release-tag -- "$env:RELEASE_TAG"

      - name: Verify tagged commit is the main tip
        shell: pwsh
        run: |
          git fetch origin main
          if ($LASTEXITCODE -ne 0) { throw "Fetching origin/main failed" }
          $mainTip = git rev-parse origin/main
          if ($LASTEXITCODE -ne 0 -or $mainTip -ne $env:GITHUB_SHA) {
            throw "Release tag commit $env:GITHUB_SHA is not origin/main tip $mainTip"
          }

      - name: Run Rust and UI tests
        run: npm test

      - name: Build Tauri NSIS installer
        run: npm run dist
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Normalize installer and updater signature
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $matches = @(Get-ChildItem src-tauri/target/release/bundle/nsis -File -Filter "*-setup.exe")
          if ($matches.Count -ne 1) { throw "Expected one NSIS installer, found $($matches.Count)" }
          if ($matches[0].Length -gt 20MB) { throw "Installer exceeds 20 MB: $([math]::Round($matches[0].Length / 1MB, 2)) MB" }
          $sourceSignature = "$($matches[0].FullName).sig"
          if (-not (Test-Path -LiteralPath $sourceSignature)) { throw "Updater signature is missing: $sourceSignature" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item -LiteralPath $matches[0].FullName -Destination "release-assets/Codex-Claude-Usage-Setup-$version.exe"
          Copy-Item -LiteralPath $sourceSignature -Destination "release-assets/Codex-Claude-Usage-Setup-$version.exe.sig"

      - name: Create and verify updater manifest
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $installer = "release-assets/Codex-Claude-Usage-Setup-$version.exe"
          $signature = "$installer.sig"
          $manifest = "release-assets/latest.json"
          $notes = "Codex Claude Usage $version 업데이트입니다. 업데이트 후 앱이 다시 시작되며 사용 기록은 유지됩니다."
          npm run create:updater-manifest -- $signature $manifest $notes
          if ($LASTEXITCODE -ne 0) { throw "Creating updater manifest failed" }
          npm run verify:updater-manifest -- $manifest $installer $signature $env:RELEASE_TAG
          if ($LASTEXITCODE -ne 0) { throw "Local updater manifest verification failed" }
          npm run verify:updater-signature -- src-tauri/tauri.conf.json $installer $signature
          if ($LASTEXITCODE -ne 0) { throw "Local updater signature verification failed" }

      - name: Create or update draft GitHub Release
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $installer = (Resolve-Path "release-assets/Codex-Claude-Usage-Setup-$version.exe").Path
          $signature = (Resolve-Path "release-assets/Codex-Claude-Usage-Setup-$version.exe.sig").Path
          $manifest = (Resolve-Path "release-assets/latest.json").Path
          $releaseNotice = @(
            '> [!WARNING]'
            '> 이 설치 파일은 SignPath Foundation 승인 전이므로 Authenticode 코드 서명이 적용되지 않았습니다. Windows SmartScreen에 `알 수 없는 게시자` 경고가 표시될 수 있습니다.'
            '>'
            '> v1.1.1에는 자동 업데이트 기능이 없습니다. v1.1.1 사용자는 현재 릴리스 설치 파일을 한 번 직접 내려받아 설치해야 하며, 이후 버전부터 앱 내 업데이트를 사용할 수 있습니다.'
          ) -join [Environment]::NewLine
          gh release view $env:RELEASE_TAG --json isDraft 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            $release = gh release view $env:RELEASE_TAG --json isDraft | ConvertFrom-Json
            if (-not $release.isDraft) { throw "Refusing to replace an already published release" }
            gh release upload $env:RELEASE_TAG $installer $signature $manifest --clobber
          } else {
            gh release create $env:RELEASE_TAG $installer $signature $manifest --draft --title "Codex Claude Usage $version" --notes $releaseNotice --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { throw "Uploading release asset failed" }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify draft release bytes and updater signature
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $expected = @(
            "Codex-Claude-Usage-Setup-$version.exe",
            "Codex-Claude-Usage-Setup-$version.exe.sig",
            "latest.json"
          )
          $release = gh release view $env:RELEASE_TAG --json isDraft,assets | ConvertFrom-Json
          if (-not $release.isDraft) { throw "Release must remain draft until verification succeeds" }
          $actual = @($release.assets | ForEach-Object { $_.name } | Sort-Object)
          if (Compare-Object ($expected | Sort-Object) $actual) { throw "Unexpected release assets: $($actual -join ', ')" }
          foreach ($asset in $release.assets) {
            if ((Get-Item "release-assets/$($asset.name)").Length -ne $asset.size) {
              throw "Release asset size mismatch: $($asset.name)"
            }
          }

          $remoteDir = Join-Path $env:RUNNER_TEMP 'draft-release-assets'
          New-Item -ItemType Directory -Force $remoteDir | Out-Null
          gh release download $env:RELEASE_TAG --dir $remoteDir
          if ($LASTEXITCODE -ne 0) { throw "Downloading draft release assets failed" }
          foreach ($name in $expected) {
            $localHash = (Get-FileHash -LiteralPath "release-assets/$name" -Algorithm SHA256).Hash
            $remoteHash = (Get-FileHash -LiteralPath (Join-Path $remoteDir $name) -Algorithm SHA256).Hash
            if ($localHash -ne $remoteHash) { throw "Draft release hash mismatch: $name" }
          }
          $remoteInstaller = Join-Path $remoteDir "Codex-Claude-Usage-Setup-$version.exe"
          $remoteSignature = "$remoteInstaller.sig"
          $remoteManifest = Join-Path $remoteDir 'latest.json'
          npm run verify:updater-manifest -- $remoteManifest $remoteInstaller $remoteSignature $env:RELEASE_TAG
          if ($LASTEXITCODE -ne 0) { throw "Remote updater manifest verification failed" }
          npm run verify:updater-signature -- src-tauri/tauri.conf.json $remoteInstaller $remoteSignature
          if ($LASTEXITCODE -ne 0) { throw "Remote updater signature verification failed" }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish completed GitHub Release
        shell: pwsh
        run: gh release edit $env:RELEASE_TAG --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-publish canary for updater manifest
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $url = "https://github.com/Kyuhan1230/ai-usage-monitor/releases/latest/download/latest.json"
          $manifest = $null
          $lastFailure = "No response"
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              $cacheBust = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
              $candidate = Invoke-RestMethod -Uri "${url}?cachebust=$cacheBust" -Headers @{ "Cache-Control" = "no-cache" }
              if ($candidate.version -eq $version) {
                $manifest = $candidate
                break
              }
              $lastFailure = "Expected $version but received $($candidate.version)"
            } catch {
              $lastFailure = $_.Exception.Message
            }
            if ($attempt -lt 6) { Start-Sleep -Seconds 10 }
          }
          if ($null -eq $manifest) { throw "Published latest.json was not ready after retries: $lastFailure" }
          $platform = $manifest.platforms.'windows-x86_64'
          $expectedUrl = "https://github.com/Kyuhan1230/ai-usage-monitor/releases/download/v$version/Codex-Claude-Usage-Setup-$version.exe"
          if ($null -eq $platform) { throw "Published manifest is missing windows-x86_64" }
          if ($platform.url -ne $expectedUrl) { throw "Published installer URL mismatch: $($platform.url)" }
          if ([string]::IsNullOrWhiteSpace([string]$platform.signature)) { throw "Published manifest signature is empty" }
