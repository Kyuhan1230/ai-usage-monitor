name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend build tooling
        run: npm ci

      - name: Verify tag matches package version
        run: npm run verify:release-tag -- "${{ github.ref_name }}"

      - name: Verify tagged commit belongs to main
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$env:GITHUB_SHA" "origin/main"
          if ($LASTEXITCODE -ne 0) { throw "Release tag must point to a commit on main" }

      - name: Run Rust and UI tests
        run: npm test

      - name: Build Tauri NSIS installer
        run: npm run dist
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Normalize installer and updater signature
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $matches = @(Get-ChildItem src-tauri/target/release/bundle/nsis -File -Filter "*-setup.exe")
          if ($matches.Count -ne 1) { throw "Expected one NSIS installer, found $($matches.Count)" }
          if ($matches[0].Length -gt 20MB) { throw "Installer exceeds 20 MB: $([math]::Round($matches[0].Length / 1MB, 2)) MB" }
          $sourceSignature = "$($matches[0].FullName).sig"
          if (-not (Test-Path -LiteralPath $sourceSignature)) { throw "Updater signature is missing: $sourceSignature" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item -LiteralPath $matches[0].FullName -Destination "release-assets/Codex-Claude-Usage-Setup-$version.exe"
          Copy-Item -LiteralPath $sourceSignature -Destination "release-assets/Codex-Claude-Usage-Setup-$version.exe.sig"

      - name: Create and verify updater manifest
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $installer = "release-assets/Codex-Claude-Usage-Setup-$version.exe"
          $signature = "$installer.sig"
          $manifest = "release-assets/latest.json"
          $notes = "Codex Claude Usage $version 업데이트입니다. 업데이트 후 앱이 다시 시작되며 사용 기록은 유지됩니다."
          npm run create:updater-manifest -- $signature $manifest $notes
          npm run verify:updater-manifest -- $manifest $installer $signature "${{ github.ref_name }}"
          npm run verify:updater-signature -- src-tauri/tauri.conf.json $installer $signature

      - name: Create or update draft GitHub Release
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $installer = (Resolve-Path "release-assets/Codex-Claude-Usage-Setup-$version.exe").Path
          $signature = (Resolve-Path "release-assets/Codex-Claude-Usage-Setup-$version.exe.sig").Path
          $manifest = (Resolve-Path "release-assets/latest.json").Path
          gh release view "${{ github.ref_name }}" --json isDraft 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            $release = gh release view "${{ github.ref_name }}" --json isDraft | ConvertFrom-Json
            if (-not $release.isDraft) { throw "Refusing to replace an already published release" }
            gh release upload "${{ github.ref_name }}" $installer $signature $manifest --clobber
          } else {
            gh release create "${{ github.ref_name }}" $installer $signature $manifest --draft --title "Codex Claude Usage $version" --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { throw "Uploading release asset failed" }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify draft release asset
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $expected = @(
            "Codex-Claude-Usage-Setup-$version.exe",
            "Codex-Claude-Usage-Setup-$version.exe.sig",
            "latest.json"
          )
          $release = gh release view "${{ github.ref_name }}" --json isDraft,assets | ConvertFrom-Json
          if (-not $release.isDraft) { throw "Release must remain draft until verification succeeds" }
          $actual = @($release.assets | ForEach-Object { $_.name } | Sort-Object)
          if (Compare-Object ($expected | Sort-Object) $actual) { throw "Unexpected release assets: $($actual -join ', ')" }
          foreach ($asset in $release.assets) {
            if ((Get-Item "release-assets/$($asset.name)").Length -ne $asset.size) {
              throw "Release asset size mismatch: $($asset.name)"
            }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish completed GitHub Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test published updater manifest
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $url = "https://github.com/Kyuhan1230/ai-usage-monitor/releases/latest/download/latest.json"
          $response = $null
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing
              if ($response.StatusCode -eq 200) { break }
            } catch {
              if ($attempt -eq 6) { throw }
            }
            Start-Sleep -Seconds 10
          }
          if ($null -eq $response -or $response.StatusCode -ne 200) { throw "Published latest.json did not return HTTP 200" }
          $manifest = $response.Content | ConvertFrom-Json
          if ($manifest.version -ne $version) { throw "Published manifest version mismatch: $($manifest.version)" }
