name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend build tooling
        run: npm ci

      - name: Run Rust and UI tests
        run: npm test

      - name: Build Tauri NSIS installer
        run: npm run dist

      - name: Enforce lightweight installer budget
        shell: pwsh
        run: |
          $installer = @(Get-ChildItem src-tauri/target/release/bundle/nsis -File -Filter "*-setup.exe")
          if ($installer.Count -ne 1) { throw "Expected one NSIS installer, found $($installer.Count)" }
          if ($installer[0].Length -gt 20MB) { throw "Installer exceeds 20 MB: $([math]::Round($installer[0].Length / 1MB, 2)) MB" }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-claude-usage-windows
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 14
