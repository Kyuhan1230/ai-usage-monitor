<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Claude Usage Setup</title>
  <link rel="stylesheet" href="setup.css">
</head>
<body>
  <main class="setup">
    <header>
      <p class="eyebrow">Setup</p>
      <h1>Codex Claude Usage</h1>
      <p class="summary">사용하는 도구 하나만 연결해도 시작할 수 있습니다. 계정 정보나 명령 출력은 저장하지 않으며, 필요한 단계만 실행할 수 있습니다.</p>
    </header>

    <section class="checks">
      <article class="check">
        <div>
          <h2>Codex CLI</h2>
          <p id="codex-detail" class="status-message">확인 중</p>
        </div>
        <button id="codex-login" type="button">확인 중</button>
      </article>

      <article class="check">
        <div>
          <h2>Claude Code</h2>
          <p id="claude-detail" class="status-message">확인 중</p>
        </div>
        <button id="claude-auth" type="button">확인 중</button>
      </article>

      <article class="check">
        <div>
          <h2>Claude statusLine 이벤트</h2>
          <p id="hook-detail">확인 중</p>
        </div>
        <button id="install-hook" type="button">이벤트 연결</button>
      </article>

      <article class="check">
        <div>
          <h2>로컬 토큰 상세</h2>
          <p id="details-detail">확인 중</p>
        </div>
        <button id="open-details" type="button">상세 열기</button>
      </article>

      <article class="check">
        <div>
          <h2>활동 중 자동 확인</h2>
          <p id="monitoring-detail">확인 중</p>
        </div>
        <label class="toggle">
          <input id="activity-monitoring" type="checkbox">
          <span>자동 확인</span>
        </label>
      </article>

      <article class="check">
        <div>
          <h2>Windows 시작 시 실행</h2>
          <p id="startup-detail">확인 중</p>
        </div>
        <label class="toggle">
          <input id="launch-at-login" type="checkbox">
          <span>자동 실행</span>
        </label>
      </article>
    </section>

    <p id="action-message" class="action-message" role="status" aria-live="polite"></p>

    <footer>
      <div class="onboarding-actions">
        <button id="setup-later" type="button">나중에</button>
        <button id="setup-complete" type="button" disabled>설정 완료</button>
      </div>
      <div class="status-actions">
        <button id="refresh" type="button">상태 다시 확인</button>
        <button id="collect" type="button">연결된 도구 사용량 확인</button>
      </div>
    </footer>
  </main>
  <script src="bridge.js"></script>
  <script src="setup.js"></script>
</body>
</html>
