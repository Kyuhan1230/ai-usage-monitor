<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usage Compact</title>
  <link rel="stylesheet" href="compact.css">
</head>
<body>
  <main class="shell">
    <header class="titlebar">
      <div>
        <div class="eyebrow">AI CLI Usage</div>
        <h1>Codex, Claude</h1>
      </div>
      <div class="window-actions">
        <button class="icon-button" id="minimize" type="button" title="최소화" aria-label="최소화">-</button>
        <button class="icon-button" id="close" type="button" title="트레이로 숨기기" aria-label="트레이로 숨기기">x</button>
      </div>
    </header>

    <section class="meters" id="meters">
      <article class="meter" data-tool="codex">
        <div class="meter-head">
          <span>Codex</span>
          <span class="state" id="codex-state">확인 중</span>
        </div>
        <div class="limit-bars">
          <div class="limit-bar">
            <div class="limit-line"><span>5시간</span><strong id="codex-five-hour">--</strong></div>
            <div class="bar-track" id="codex-five-hour-bar" role="meter" aria-label="Codex 5시간 한도" aria-valuemin="0" aria-valuemax="100"><span></span></div>
          </div>
          <div class="limit-bar">
            <div class="limit-line"><span>주간</span><strong id="codex-weekly">--</strong></div>
            <div class="bar-track" id="codex-weekly-bar" role="meter" aria-label="Codex 주간 한도" aria-valuemin="0" aria-valuemax="100"><span></span></div>
          </div>
          <div class="reset" id="codex-reset">서버가 값을 읽는 중</div>
          <div class="stamp" id="codex-stamp">마지막 갱신 확인 중</div>
        </div>
      </article>

      <article class="meter" data-tool="claude">
        <div class="meter-head">
          <span>Claude</span>
          <span class="state" id="claude-state">확인 중</span>
        </div>
        <div class="limit-bars">
          <div class="limit-bar">
            <div class="limit-line"><span>세션</span><strong id="claude-five-hour">--</strong></div>
            <div class="bar-track" id="claude-five-hour-bar" role="meter" aria-label="Claude 세션 한도" aria-valuemin="0" aria-valuemax="100"><span></span></div>
          </div>
          <div class="limit-bar">
            <div class="limit-line"><span>주간</span><strong id="claude-seven-day">--</strong></div>
            <div class="bar-track" id="claude-seven-day-bar" role="meter" aria-label="Claude 주간 한도" aria-valuemin="0" aria-valuemax="100"><span></span></div>
          </div>
          <div class="reset" id="claude-reset">hook 상태 확인 중</div>
          <div class="stamp" id="claude-stamp">마지막 갱신 확인 중</div>
        </div>
      </article>
    </section>

    <button id="decision" class="decision-strip" type="button" data-tone="neutral" title="Usage Insights 열기">
      <span id="decision-status" class="decision-status">판정 준비 중</span>
      <strong id="decision-action">새로고침하면 고갈 위험을 계산합니다.</strong>
    </button>

    <section class="controls">
      <label class="toggle">
        <input id="always-on-top" type="checkbox" aria-label="창을 항상 위에 표시">
        <span>항상 위</span>
      </label>
      <label class="opacity-control">
        <span>투명도</span>
        <input id="opacity" type="range" min="55" max="100" value="96" aria-label="창 투명도">
      </label>
    </section>

    <footer class="actions">
      <button id="refresh" type="button">새로고침</button>
      <button id="open-insights" type="button">분석</button>
      <button id="open-setup" type="button">Setup</button>
      <button id="open-details" type="button" title="로컬 토큰 상세">상세</button>
    </footer>
  </main>
  <script src="bridge.js"></script>
  <script src="status-health.js"></script>
  <script src="compact.js"></script>
</body>
</html>
