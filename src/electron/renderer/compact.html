<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usage Compact</title>
  <link rel="stylesheet" href="compact.css">
</head>
<body>
  <main class="shell">
    <header class="titlebar">
      <div>
        <div class="eyebrow">AI CLI Usage</div>
        <h1>Codex, Claude</h1>
      </div>
      <div class="window-actions">
        <button class="icon-button" id="minimize" type="button" title="최소화">-</button>
        <button class="icon-button" id="quit" type="button" title="종료">x</button>
      </div>
    </header>

    <section class="meters" id="meters">
      <article class="meter" data-tool="codex">
        <div class="meter-head">
          <span>Codex</span>
          <span class="state" id="codex-state">확인 중</span>
        </div>
        <div class="meter-row">
          <div class="dial" id="codex-dial"><span id="codex-value">--</span></div>
          <div class="meter-copy">
            <div class="limit-line"><span>5h</span><strong id="codex-five-hour">--</strong></div>
            <div class="limit-line"><span>Week</span><strong id="codex-weekly">--</strong></div>
            <div class="reset" id="codex-reset">서버가 값을 읽는 중</div>
            <div class="stamp" id="codex-stamp">마지막 갱신 확인 중</div>
          </div>
        </div>
      </article>

      <article class="meter" data-tool="claude">
        <div class="meter-head">
          <span>Claude</span>
          <span class="state" id="claude-state">확인 중</span>
        </div>
        <div class="meter-row">
          <div class="dial" id="claude-dial"><span id="claude-value">--</span></div>
          <div class="meter-copy">
            <div class="limit-line"><span>Session</span><strong id="claude-five-hour">--</strong></div>
            <div class="limit-line"><span>Week</span><strong id="claude-seven-day">--</strong></div>
            <div class="reset" id="claude-reset">hook 상태 확인 중</div>
            <div class="stamp" id="claude-stamp">마지막 갱신 확인 중</div>
          </div>
        </div>
      </article>
    </section>

    <section class="controls">
      <label class="toggle">
        <input id="always-on-top" type="checkbox">
        <span>항상 위</span>
      </label>
      <label class="opacity-control">
        <span>투명도</span>
        <input id="opacity" type="range" min="55" max="100" value="96">
      </label>
    </section>

    <footer class="actions">
      <button id="refresh" type="button">새로고침</button>
      <button id="open-setup" type="button">Setup</button>
      <button id="open-dashboard" type="button">전체 대시보드</button>
    </footer>
  </main>
  <script src="compact.js"></script>
</body>
</html>
